<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issue Tracker | Home Page</title>
  <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

  <!-- daisy + tailwind link -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- fontawesome link -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- external css -->
  <link rel="stylesheet" href="./style.css">

  <!-- google font link -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
</head>

<body>
  <header class="bg-base-100 shadow-sm">
    <div class="navbar w-11/12 mx-auto">
      <div class="navbar-start">
        <div class="dropdown">
          <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16" />
            </svg>
          </div>
          <ul tabindex="-1" class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow space-y-4">
            <label class="input w-48">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input type="text" placeholder="Search issues...">
            </label>
            <a class="btn"><i class="fa-solid fa-plus"></i> New Issue</a>
          </ul>
        </div>

        <div class="flex items-center gap-3">
          <img class="w-12 h-12" src="./assets/github-logo.png" alt="github logo">
          <h2 class="font-bold text-xl">GitHub Issues Tracker</h2>
        </div>


      </div>


      <div class="navbar-end hidden lg:flex space-x-2">
        <label class="input w-64">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" placeholder="Search issues...">
        </label>
        <a class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</a>
      </div>


    </div>
  </header>

  

</body>

</html>
