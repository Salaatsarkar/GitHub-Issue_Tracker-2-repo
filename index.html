<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker | Login Page</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- daisy + tailwind link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- fontawesome link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- external css -->
    <link rel="stylesheet" href="./style.css">
    <!-- google font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>
<body class="max-w-md min-h-screen mx-auto  shadow-lg rounded-md my-10 py-8">
    <section>
        <div class="">
            <img class="mx-auto mb-5" src="./assets/github-logo.png" alt="github-logo">
            <h1 class="font-semibold text-2xl text-center">GitHub Issues Tracker</h1>
            <p class="text-[#64748B] text-center">Sign in to manage your issues</p>
        </div>

       <form action="">
         <fieldset class="fieldset max-w-sm mx-auto mt-5">
            <label class="label font-medium text-[#1F2937]">Username</label>
            <input id="input-name" type="text" class="input w-full rounded-md" placeholder="Enter Username" required />
            <p class="text-[#4A00FF]">Default: admin</p>

            <label class="label font-medium text-[#1F2937]">Password</label>
            <input id="input-password" type="password" class="input w-full rounded-md" placeholder="Enter Password" required />
            <p class="text-[#4A00FF]">Default: admin123</p>

            <button id="signin-btn" type="submit" class="btn btn-primary mt-4 rounded-md">Sign In</button>
             <div class="divider">OR</div>
        </fieldset>
       </form>

        <p class="text-center text-neutral/50 ">Demo Credentials:</p>
        <div class="bg-base-200 py-5 max-w-sm mx-auto text-center rounded-lg mt-3">
            <p class="font-semibold">Username:  <span class="text-neutral/50">admin</span></p>
            <p class="font-semibold">Password:  <span class="text-neutral/50"> admin123</span></p>
        </div>
    </section>
   
    <script src="./js/login.js"></script>
</body>
</html>
